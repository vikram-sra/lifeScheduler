<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
    <rect width="200" height="200" fill="#2a103c" />
    <defs>
        <!-- The animation can remain internal and be frozen on the static layer later, or we just let it run entirely via SMIL -->
    </defs>

    <!-- Concentric Ripples -->
    <g fill="none" stroke="#fff" transform-origin="center">
        <!-- Ripple 1 -->
        <circle cx="100" cy="100" r="10">
            <animate attributeName="r" values="10; 80; 80" keyTimes="0; 0.9; 1" dur="8s" repeatCount="indefinite" />
            <animate attributeName="stroke-width" values="6; 1; 1" keyTimes="0; 0.9; 1" dur="8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 0.6; 0; 0" keyTimes="0; 0.1; 0.9; 1" dur="8s" repeatCount="indefinite" />
        </circle>
        
        <!-- Ripple 2 -->
        <circle cx="100" cy="100" r="10">
            <animate attributeName="r" values="10; 80; 80" keyTimes="0; 0.9; 1" dur="8s" begin="2s" repeatCount="indefinite" />
            <animate attributeName="stroke-width" values="6; 1; 1" keyTimes="0; 0.9; 1" dur="8s" begin="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 0.6; 0; 0" keyTimes="0; 0.1; 0.9; 1" dur="8s" begin="2s" repeatCount="indefinite" />
        </circle>
        
        <!-- Ripple 3 -->
        <circle cx="100" cy="100" r="10">
            <animate attributeName="r" values="10; 80; 80" keyTimes="0; 0.9; 1" dur="8s" begin="4s" repeatCount="indefinite" />
            <animate attributeName="stroke-width" values="6; 1; 1" keyTimes="0; 0.9; 1" dur="8s" begin="4s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 0.6; 0; 0" keyTimes="0; 0.1; 0.9; 1" dur="8s" begin="4s" repeatCount="indefinite" />
        </circle>

        <!-- Ripple 4 -->
        <circle cx="100" cy="100" r="10">
            <animate attributeName="r" values="10; 80; 80" keyTimes="0; 0.9; 1" dur="8s" begin="6s" repeatCount="indefinite" />
            <animate attributeName="stroke-width" values="6; 1; 1" keyTimes="0; 0.9; 1" dur="8s" begin="6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 0.6; 0; 0" keyTimes="0; 0.1; 0.9; 1" dur="8s" begin="6s" repeatCount="indefinite" />
        </circle>
    </g>

    <!-- Center Point Base Pulse -->
    <circle cx="100" cy="100" r="2" fill="#fff" opacity="0.3">
        <animate attributeName="opacity" values="0.3; 0.8; 0.3" dur="4s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="scale" values="1; 1.2; 1" dur="4s" repeatCount="indefinite" transform-origin="100 100" />
    </circle>
</svg>
