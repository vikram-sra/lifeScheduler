<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
    <defs>
        <!-- Deep Financial Emerald Gradient -->
        <linearGradient id="bg-finances" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#064e3b" />
            <stop offset="100%" stop-color="#022c22" />
        </linearGradient>
        
        <!-- Glowing Grid Pattern -->
        <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.2" />
        </pattern>

        <!-- Golden Coin Shine -->
        <radialGradient id="coinShine" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#fbbf24" />
            <stop offset="100%" stop-color="#b45309" />
        </radialGradient>
    </defs>
    
    <!-- Background -->
    <rect width="300" height="120" fill="url(#bg-finances)" />
    <rect width="300" height="120" fill="url(#grid)" />

    <!-- Rising Data Line -->
    <path d="M 0,100 Q 50,90 80,105 T 150,70 T 220,85 T 300,40" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" opacity="0.6">
        
    </path>
    <path d="M 0,100 Q 50,90 80,105 T 150,70 T 220,85 T 300,40" fill="none" stroke="#34d399" stroke-width="1" stroke-linecap="round" opacity="0.4">
        
    </path>

    <!-- Floating Glowing Coins -->
    <g>
        <!-- Coin 1 -->
        <g transform="translate(40, 40)">
            
            <circle r="8" fill="url(#coinShine)" stroke="#f59e0b" stroke-width="1" />
            <text x="0" y="3" font-size="8" text-anchor="middle" fill="#78350f" font-weight="bold" font-family="Arial">$</text>
            <circle r="8" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5">
                
                
            </circle>
        </g>

        <!-- Coin 2 -->
        <g transform="translate(260, 80)">
            
            <circle r="6" fill="url(#coinShine)" stroke="#f59e0b" stroke-width="1" />
            <text x="0" y="2.5" font-size="6" text-anchor="middle" fill="#78350f" font-weight="bold" font-family="Arial">$</text>
            <circle r="6" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5">
                
                
            </circle>
        </g>

        <!-- Coin 3 -->
        <g transform="translate(180, 30)">
            
            <circle r="5" fill="url(#coinShine)" stroke="#f59e0b" stroke-width="1" />
            <text x="0" y="2" font-size="5" text-anchor="middle" fill="#78350f" font-weight="bold" font-family="Arial">$</text>
        </g>
    </g>

    <!-- Scanning Line (Terminal feel) -->
    <rect width="300" height="1" fill="#10b981" opacity="0.3">
        
    </rect>
</svg>
