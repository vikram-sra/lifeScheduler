<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" />
      <stop offset="100%" stop-color="#E0F6FF" />
    </linearGradient>

    <g id="bird" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0,5 Q5,0 10,5 Q15,0 20,5">
        
      </path>
    </g>

    <!-- New elements: Grass, Flowers, and Pine Trees -->
    <g id="grass-tuft" fill="#2E8B57">
      
      <path d="M0,0 Q-3,-8 -5,-12 Q0,-8 2,0 Z" />
      <path d="M2,0 Q3,-10 5,-14 Q4,-8 6,0 Z" />
      <path d="M4,0 Q8,-8 10,-10 Q7,-6 7,0 Z" />
    </g>

    <g id="flower">
      
      <rect x="-1" y="-12" width="2" height="12" fill="#228B22" />
      <circle cx="0" cy="-12" r="3" fill="#FF69B4" />
      <circle cx="-3" cy="-15" r="3" fill="#FF69B4" />
      <circle cx="3" cy="-15" r="3" fill="#FF69B4" />
      <circle cx="-3" cy="-9" r="3" fill="#FF69B4" />
      <circle cx="3" cy="-9" r="3" fill="#FF69B4" />
      <circle cx="0" cy="-12" r="2" fill="#FFD700" />
    </g>

    <g id="pine-tree">
      <rect x="-3" y="-20" width="6" height="20" fill="#5C4033" />
      <g fill="#2E8B57">
        
        <polygon points="0,-45 -15,-15 15,-15" />
        <polygon points="0,-30 -12,-5 12,-5" />
      </g>
    </g>
  </defs>

  <rect width="300" height="150" fill="url(#skyGradient)" />

  <circle cx="250" cy="40" r="20" fill="#FFD700">
    
  </circle>

  <path d="M-50,150 Q50,90 150,150 Q250,100 350,150 Z" fill="#8FBC8F" opacity="0.6" />

  <rect x="0" y="120" width="300" height="30" fill="#32CD32" />

  <g stroke="#ffffff" stroke-width="2" opacity="0.6" stroke-linecap="round">
    <line x1="0" y1="50" x2="40" y2="50">
      
    </line>
    <line x1="0" y1="80" x2="60" y2="80">
      
    </line>
    <line x1="0" y1="30" x2="30" y2="30">
      
    </line>
  </g>

  <use href="#bird" x="-30" y="30">
    
  </use>
  <use href="#bird" x="-50" y="50">
    
  </use>

  <!-- New Pine Trees -->
  <g transform="translate(30, 125)"><use href="#pine-tree" /></g>
  <g transform="translate(130, 122) scale(0.85)"><use href="#pine-tree" /></g>
  <g transform="translate(250, 128) scale(0.9)"><use href="#pine-tree" /></g>

  <g transform="translate(60, 130)">
    <rect x="-4" y="-30" width="8" height="30" fill="#8B4513" />
    <g fill="#228B22">
      
      <circle cx="0" cy="-40" r="18" />
      <circle cx="-12" cy="-30" r="14" />
      <circle cx="12" cy="-30" r="14" />
    </g>
  </g>

  <g transform="translate(180, 135)">
    <rect x="-5" y="-40" width="10" height="40" fill="#654321" />
    <g fill="#006400">
      
      <circle cx="0" cy="-50" r="22" />
      <circle cx="-15" cy="-35" r="18" />
      <circle cx="15" cy="-35" r="18" />
    </g>
  </g>

  <!-- New Grass Patches -->
  <use href="#grass-tuft" x="15" y="145" />
  <use href="#grass-tuft" x="45" y="135" />
  <use href="#grass-tuft" x="90" y="148" />
  <use href="#grass-tuft" x="110" y="130" />
  <use href="#grass-tuft" x="150" y="142" />
  <use href="#grass-tuft" x="210" y="145" />
  <use href="#grass-tuft" x="240" y="135" />
  <use href="#grass-tuft" x="280" y="148" />

  <!-- New Flowers -->
  <use href="#flower" x="25" y="140" />
  <use href="#flower" x="80" y="145" />
  <use href="#flower" x="100" y="135" />
  <use href="#flower" x="160" y="148" />
  <use href="#flower" x="200" y="138" />
  <use href="#flower" x="260" y="142" />
  <use href="#flower" x="290" y="135" />
</svg>
