<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="100%" height="100%"
    preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bg-work" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a101d" />
            <stop offset="100%" stop-color="#02040a" />
        </linearGradient>
    </defs>
    <rect width="300" height="120" fill="url(#bg-work)" />
    
    <!-- Restored Original Window shape with darker title bar for static -->
    <rect x="70" y="20" width="160" height="80" rx="6" fill="#000000" stroke="#1e293b" stroke-width="2" />
    <rect x="70" y="20" width="160" height="15" fill="#1e293b" />
    
    <!-- Window buttons -->
    <circle cx="80" cy="27.5" r="3" fill="#991b1b" />
    <circle cx="90" cy="27.5" r="3" fill="#a16207" />
    <circle cx="100" cy="27.5" r="3" fill="#166534" />
    
    <!-- Content inside window - Horizontal bars faded -->
    <g fill="#0284c7" opacity="0.35">
        <rect x="80" y="45" width="60" height="4" rx="2"></rect>
        <rect x="80" y="55" width="40" height="4" rx="2"></rect>
        <rect x="95" y="65" width="80" height="4" rx="2"></rect>
        <rect x="95" y="75" width="50" height="4" rx="2"></rect>
    </g>
    <!-- Blinker bright -->
    <g fill="#38bdf8" opacity="0.35">
        <rect x="80" y="85" width="6" height="4"></rect>
    </g>
</svg>
