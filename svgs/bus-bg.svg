<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" preserveAspectRatio="xMidYMid slice">
  <linearGradient id="skyBus" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#74b9ff" />
    <stop offset="100%" stop-color="#0984e3" />
  </linearGradient>
  <rect width="300" height="100" fill="url(#skyBus)" />

  <circle cx="260" cy="30" r="15" fill="#FFD700" opacity="0.8">
    <animate attributeName="r" values="15; 18; 15" dur="3s" repeatCount="indefinite" />
  </circle>

  <g opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="0,0; -150,0" dur="15s" repeatCount="indefinite" />
    <path d="M0,60 L20,60 L20,30 L40,30 L40,50 L60,50 L60,20 L80,20 L80,60 Q150,60 300,60 L300,100 L0,100 Z" fill="#2d3436" />
    <path d="M300,60 L320,60 L320,30 L340,30 L340,50 L360,50 L360,20 L380,20 L380,60 Q450,60 600,60 L600,100 L300,100 Z" fill="#2d3436" />
  </g>

  <rect x="0" y="75" width="300" height="25" fill="#636e72" />
  
  <g stroke="#b2bec3" stroke-width="2" stroke-dasharray="15 10">
     <animateTransform attributeName="transform" type="translate" values="30,0; -30,0" dur="0.6s" repeatCount="indefinite" />
     <line x1="-50" y1="87" x2="350" y2="87" />
  </g>

  <g>
     <animateTransform attributeName="transform" type="translate" values="0,1; 0,-1; 0,1" dur="0.4s" repeatCount="indefinite" />
     <ellipse cx="150" cy="80" rx="45" ry="4" fill="#2d3436" opacity="0.5" />
     <rect x="100" y="35" width="100" height="40" rx="4" fill="#d63031" />
     <rect x="102" y="32" width="96" height="3" fill="#ff7675" />
     
     <rect x="105" y="42" width="25" height="15" rx="2" fill="#dfe6e9" />
     <rect x="135" y="42" width="25" height="15" rx="2" fill="#dfe6e9" />
     <rect x="165" y="42" width="25" height="15" rx="2" fill="#dfe6e9" />
     
     <rect x="100" y="62" width="100" height="3" fill="#ffeaa7" />

     <circle cx="125" cy="75" r="9" fill="#2d3436" />
     <circle cx="125" cy="75" r="4" fill="#b2bec3" />
     <circle cx="175" cy="75" r="9" fill="#2d3436" />
     <circle cx="175" cy="75" r="4" fill="#b2bec3" />
  </g>
</svg>
