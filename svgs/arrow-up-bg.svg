<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs>
        <symbol id="arrow" viewBox="0 0 40 40">
            <path d="M20 5 L10 20 H15 V35 H25 V20 H30 L20 5Z" fill="currentColor" />
        </symbol>
    </defs>

    <g color="#00d9ff">
        <!-- Main central stream -->
        <g>
            <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="2s" repeatCount="indefinite" />
            <use href="#arrow" x="30" y="0" width="40" height="40" opacity="0.3" />
            <use href="#arrow" x="30" y="100" width="40" height="40" opacity="0.3" />
        </g>
        
        <!-- Faster, smaller side stream -->
        <g>
            <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="1.2s" repeatCount="indefinite" />
            <use href="#arrow" x="10" y="50" width="20" height="20" opacity="0.15" />
            <use href="#arrow" x="10" y="150" width="20" height="20" opacity="0.15" />
        </g>

        <!-- Slower, side stream -->
        <g>
            <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="3s" repeatCount="indefinite" />
            <use href="#arrow" x="70" y="20" width="25" height="25" opacity="0.2" />
            <use href="#arrow" x="70" y="120" width="25" height="25" opacity="0.2" />
        </g>
        
        <!-- Speed lines -->
        <g stroke="#00d9ff" stroke-width="1" opacity="0.2">
            <animateTransform attributeName="transform" type="translate" from="0 100" to="0 0" dur="0.8s" repeatCount="indefinite" />
            <line x1="15" y1="0" x2="15" y2="20" />
            <line x1="15" y1="100" x2="15" y2="120" />
            <line x1="85" y1="30" x2="85" y2="60" />
            <line x1="85" y1="130" x2="85" y2="160" />
        </g>
    </g>
</svg>
