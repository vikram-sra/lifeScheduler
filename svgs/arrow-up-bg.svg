<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="animGrad" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0" />
            <stop offset="50%" style="stop-color:#00d9ff;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:0" />
        </linearGradient>
    </defs>
    <g>
        <path d="M100 30 L60 80 H90 V170 H110 V80 H140 L100 30Z" fill="url(#animGrad)">
            <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
        </path>
        <path d="M100 30 L60 80 H90 V170 H110 V80 H140 L100 30Z" fill="none" stroke="#00d9ff" stroke-width="1" stroke-dasharray="10 5">
            <animate attributeName="stroke-dashoffset" from="0" to="-30" dur="2s" repeatCount="indefinite" />
        </path>
        <animateTransform attributeName="transform" type="translate" from="0 20" to="0 -20" dur="2s" repeatCount="indefinite" />
    </g>
</svg>
