<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
    <defs>
        <!-- Very subdued, dark elegant background (not too bright) -->
        <linearGradient id="bg-meals-static" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#111827" /> <!-- dark gray/navy -->
            <stop offset="100%" stop-color="#0f172a" /> <!-- Slate dark -->
        </linearGradient>
    </defs>
    
    <rect width="300" height="120" fill="url(#bg-meals-static)" />

    <!-- Simple, dim rectangular shape (like a tray or bento box) -->
    <g fill="none" stroke="#334155" stroke-width="2" opacity="0.6">
        <!-- Outer tray rim -->
        <rect x="50" y="30" width="200" height="60" rx="8" />
        
        <!-- Inner partitioning lines (subtle) -->
        <line x1="120" y1="30" x2="120" y2="90" stroke-width="1.5" />
        <line x1="190" y1="30" x2="190" y2="90" stroke-width="1.5" />
    </g>
    
    <!-- Extremely subtle filled rectangle blocks for the 'food' placeholders -->
    <g opacity="0.15">
        <rect x="55" y="35" width="60" height="50" rx="4" fill="#64748b" />
        <rect x="125" y="35" width="60" height="50" rx="4" fill="#94a3b8" />
        <rect x="195" y="35" width="50" height="50" rx="4" fill="#475569" />
    </g>
</svg>
