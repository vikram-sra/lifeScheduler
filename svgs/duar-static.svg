<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
    <rect width="300" height="150" fill="#000" />
    <g transform="translate(50, 25)">
        <defs>
            <clipPath id="eyeShape">
                <path d="M 20 50 C 40 10, 160 10, 180 50 C 160 90, 40 90, 20 50 Z" />
            </clipPath>
        </defs>

        <!-- The Eye Interior (Black) -->
        <path d="M 20 50 C 40 10, 160 10, 180 50 C 160 90, 40 90, 20 50 Z" fill="#000" />

        <!-- The Pupil (White circle inside) -->
        <g clip-path="url(#eyeShape)">
            <circle cx="100" cy="50" r="18" fill="#fff" />
        </g>

        <!-- Thick Eye Outline -->
        <path d="M 20 50 C 40 10, 160 10, 180 50 C 160 90, 40 90, 20 50 Z" 
              fill="none" 
              stroke="#fff" 
              stroke-width="4" 
              stroke-linecap="round" />

        <!-- Lids (Black blocks that reveal the white outlines using animateTransform to replace CSS) -->
        
        
    </g>
</svg>
