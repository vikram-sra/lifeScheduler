<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep blue to cyan gradient for water -->
    <linearGradient id="deepWaterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F2027" />
      <stop offset="50%" stop-color="#203A43" />
      <stop offset="100%" stop-color="#2C5364" />
    </linearGradient>

    <!-- Master Bottle Path Outline -->
    <path id="bottleTop" d="M 245 75 C 245 95, 240 105, 230 105 L 120 105 C 100 105, 90 85, 80 85 L 50 85 L 50 88 L 40 88 L 40 62 L 50 62 L 50 65 L 80 65 C 90 65, 100 45, 120 45 L 230 45 C 240 45, 245 55, 245 75 Z" />
    
    <clipPath id="bottleClipPath">
      <use href="#bottleTop" />
    </clipPath>
  </defs>

  <!-- Dark Deep Water Background Base -->
  <rect width="300" height="150" fill="url(#deepWaterGrad)" />

  <!-- The Filling Bottle -->
  <g clip-path="url(#bottleClipPath)">
    
    <!-- Water Level Going Up and Down -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,115; 0,115; 0,45; 0,45; 0,115; 0,115" keyTimes="0; 0.25; 0.55; 0.75; 0.9; 1" dur="6s" repeatCount="indefinite" />
      
      <!-- Surface Waves (Cyber Cyan) -->
      <path fill="#43C6AC" d="M 30,0 Q 45,-6 60,0 T 90,0 T 120,0 T 150,0 T 180,0 T 210,0 T 240,0 T 270,0 L 270,80 L 30,80 Z">
        <animate attributeName="d" 
                 values="M 30,0 Q 45,-6 60,0 T 90,0 T 120,0 T 150,0 T 180,0 T 210,0 T 240,0 T 270,0 L 270,80 L 30,80 Z; 
                         M 30,0 Q 45,6 60,0 T 90,0 T 120,0 T 150,0 T 180,0 T 210,0 T 240,0 T 270,0 L 270,80 L 30,80 Z; 
                         M 30,0 Q 45,-6 60,0 T 90,0 T 120,0 T 150,0 T 180,0 T 210,0 T 240,0 T 270,0 L 270,80 L 30,80 Z" 
                 dur="2s" repeatCount="indefinite" />
      </path>
      
      <!-- Deep Body Liquid in Bottle -->
      <rect x="30" y="5" width="240" height="75" fill="#3B8D99" opacity="0.8" />

      <!-- Deep Liquid Ambient Particles moving UP (Removed blurs for perf) -->
      <circle cx="120" cy="50" r="4" fill="#E0F7FA" opacity="0.6">
         <animate attributeName="cy" values="70; -10" dur="2s" repeatCount="indefinite" />
      </circle>
      <circle cx="200" cy="40" r="6" fill="#43C6AC" opacity="0.4">
         <animate attributeName="cy" values="70; 0" dur="3s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- Tiny Bubbles (Simplified opacity, no tracking animation on cx for perf) -->
    <g opacity="0.8">
      <circle cx="100" cy="95" r="2" fill="#E0F7FA" opacity="0.9">
        <animate attributeName="cy" values="95; 55" dur="1.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="160" cy="100" r="1.5" fill="#E0F7FA" opacity="0.8">
        <animate attributeName="cy" values="100; 60" dur="2s" repeatCount="indefinite" />
      </circle>
      <circle cx="210" cy="90" r="2.5" fill="#43C6AC" opacity="0.9">
        <animate attributeName="cy" values="90; 50" dur="1.8s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Static Bottle Glass Exterior Line - outline animation REMOVED -->
  <use href="#bottleTop" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Glass Gleam Highlights -->
  <g opacity="0.6">
    <line x1="45" y1="62" x2="45" y2="88" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 100 52 C 110 50, 120 50, 130 50 L 210 50" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" stroke-linecap="round" />
    <line x1="215" y1="50" x2="225" y2="52" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
