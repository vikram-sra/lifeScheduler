<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep blue to cyan gradient for water -->
    <linearGradient id="deepWaterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F2027" />
      <stop offset="50%" stop-color="#203A43" />
      <stop offset="100%" stop-color="#2C5364" />
    </linearGradient>

    <!-- Master Bottle Path Outline -->
    <path id="bottleTop" d="M 245 75 C 245 95, 240 105, 230 105 L 120 105 C 100 105, 90 85, 80 85 L 50 85 L 50 88 L 40 88 L 40 62 L 50 62 L 50 65 L 80 65 C 90 65, 100 45, 120 45 L 230 45 C 240 45, 245 55, 245 75 Z" />
    
    <clipPath id="bottleClipPath">
      <use href="#bottleTop" />
    </clipPath>
  </defs>

  <!-- Dark Deep Water Background Base -->
  <rect width="300" height="150" fill="url(#deepWaterGrad)" />

  <g clip-path="url(#bottleClipPath)">
    <!-- Water Level Filling Right (Bottom) to Left (Top) -->
    <g>
      <!-- Starts translated far right (240), then moves to 0 -->
      <animateTransform attributeName="transform" type="translate" values="240,45; 240,45; 0,45; 0,45; 240,45; 240,45" keyTimes="0; 0.1; 0.5; 0.75; 0.9; 1" dur="6s" repeatCount="indefinite" />
      
      <!-- Advancing edge with a slight wave on the left side -->
      <path fill="#43C6AC" d="M 260,0 L 30,0 Q 22,35 30,70 L 260,70 Z">
         <animate attributeName="d"
                  values="M 260,0 L 30,0 Q 22,35 30,70 L 260,70 Z;
                          M 260,0 L 30,0 Q 38,35 30,70 L 260,70 Z;
                          M 260,0 L 30,0 Q 22,35 30,70 L 260,70 Z" 
                  dur="1s" repeatCount="indefinite" />
      </path>
      
      <!-- Deep Body Liquid in Bottle -->
      <rect x="35" y="0" width="225" height="70" fill="#3B8D99" opacity="0.8" />
      
      <!-- Bubbles moving right to left (bottom to top of bottle) -->
      <circle cy="20" r="3" fill="#E0F7FA" opacity="0.8">
        <animate attributeName="cx" values="260; 40" dur="2s" repeatCount="indefinite" />
      </circle>
      <circle cy="50" r="2" fill="#E0F7FA" opacity="0.6">
        <animate attributeName="cx" values="240; 60" dur="1.5s" repeatCount="indefinite" />
      </circle>
      <circle cy="40" r="4" fill="#43C6AC" opacity="0.7">
        <animate attributeName="cx" values="250; 50" dur="2.5s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Static Bottle Glass Exterior Line -->
  <use href="#bottleTop" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Glass Gleam Highlights -->
  <g opacity="0.6">
    <line x1="45" y1="62" x2="45" y2="88" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 100 52 C 110 50, 120 50, 130 50 L 210 50" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" stroke-linecap="round" />
    <line x1="215" y1="50" x2="225" y2="52" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
