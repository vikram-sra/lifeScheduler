<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DAY">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="application-name" content="DAY">

    <!-- Monochrome DAY Icon for Homescreen -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">

    <title>DAY</title>
    <link rel="stylesheet" href="style.css?v=9">
</head>

<body>
    <div class="schedule-container">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Rituals</th>
                        <th class="day-header" data-day="1">Monday</th>
                        <th class="day-header" data-day="2">Tuesday</th>
                        <th class="day-header" data-day="3">Wednesday</th>
                        <th class="day-header" data-day="4">Thursday</th>
                        <th class="day-header" data-day="5">Friday</th>
                        <th class="day-header" data-day="6">Saturday</th>
                        <th class="day-header" data-day="0">Sunday</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows are rendered from the data model (data.js) by render.js -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="data.js?v=9"></script>
    <script src="render.js?v=9"></script>
    <script src="script.js?v=9"></script>
</body>

</html>
